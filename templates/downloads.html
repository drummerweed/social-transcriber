{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">Downloads</h2>
    <p class="text-sm text-gray-600 mb-6">Select a requested URL below to download the original video directly to your local device.</p>

    <div class="bg-white rounded-lg shadow-md overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Video Source</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Details</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Action</th>
                </tr>
            </thead>
            <tbody id="downloads-body" class="bg-white divide-y divide-gray-200">
                <!-- Rows will be populated by JS -->
            </tbody>
        </table>
    </div>
</div>

<script>
    async function downloadVideo(url, quality) {
        // Change button to indicate downloading
        const btnId = `btn-${btoa(url).replace(/[^a-zA-Z0-9]/g, '')}`;
        const btn = document.getElementById(btnId);
        const originalText = btn.innerHTML;
        
        btn.innerHTML = `<svg class="animate-spin h-4 w-4 mr-1 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Downloading...`;
        btn.disabled = true;

        // Use a hidden form to submit the POST request and trigger the file download
        // We use an iframe so the current page doesn't get replaced if there's an error or just to be safe
        const iframeName = `download_iframe_${Date.now()}`;
        const iframe = document.createElement('iframe');
        iframe.name = iframeName;
        iframe.style.display = 'none';
        document.body.appendChild(iframe);

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/api/download';
        form.target = iframeName;
        
        const urlInput = document.createElement('input');
        urlInput.type = 'hidden';
        urlInput.name = 'url';
        urlInput.value = url;
        
        const qualityInput = document.createElement('input');
        qualityInput.type = 'hidden';
        qualityInput.name = 'quality';
        qualityInput.value = quality;
        
        form.appendChild(urlInput);
        form.appendChild(qualityInput);
        document.body.appendChild(form);
        
        form.submit();
        
        // Reset button after 3 seconds (assuming download starts or fails by then)
        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.disabled = false;
            document.body.removeChild(form);
            // Iframe will be cleaned up eventually or can be removed later
        }, 3000);
    }

    async function fetchHistory() {
        try {
            const response = await fetch('/api/history');
            const history = await response.json();
            
            // Reverse history to show newest first and use Map to deduplicate by URL
            const reversedHistory = [...history].reverse();
            const uniqueUrls = new Map();
            reversedHistory.forEach(req => {
                if (!uniqueUrls.has(req.url)) {
                    uniqueUrls.set(req.url, req);
                }
            });

            const tbody = document.getElementById('downloads-body');
            tbody.innerHTML = '';

            uniqueUrls.forEach(req => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-colors duration-150";

                let details = `<div class="text-sm font-medium text-gray-900 truncate max-w-sm" title="${req.url}">${req.url}</div>`;
                if (req.title) {
                    details += `<div class="text-xs text-gray-500 max-w-sm truncate" title="${req.title}">${req.title}</div>`;
                }

                let qualitySelectId = `quality-${req.id}`;
                let isInstagram = req.url.includes('instagram.com');
                let isYouTube = req.url.includes('youtube.com') || req.url.includes('youtu.be');

                let selectOptions = `<option value="best">Best Available</option>`;
                if (isYouTube) {
                    selectOptions = `
                        <option value="1080">1080p</option>
                        <option value="720" selected>720p</option>
                        <option value="480">480p</option>
                        <option value="best">Best Available</option>
                    `;
                }

                let btnId = `btn-${btoa(req.url).replace(/[^a-zA-Z0-9]/g, '')}`;

                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${req.source}
                    </td>
                    <td class="px-6 py-4">
                        ${details}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <div class="flex items-center justify-end space-x-2">
                            <select id="${qualitySelectId}" class="block w-32 pl-3 pr-8 py-1.5 text-sm border border-gray-300 focus:outline-none focus:ring-black focus:border-black rounded-md bg-white text-gray-700">
                                ${selectOptions}
                            </select>
                            <button id="${btnId}" onclick="downloadVideo('${req.url}', document.getElementById('${qualitySelectId}').value)" class="inline-flex items-center justify-center w-28 px-3 py-1.5 border border-transparent text-xs font-medium rounded-md shadow-sm text-white bg-black hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black transition-colors disabled:opacity-50">
                                <svg class="h-4 w-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                Download
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            if (uniqueUrls.size === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="px-6 py-12 text-center text-sm text-gray-500">No previous requests found.</td></tr>`;
            }
        } catch (error) {
            console.error('Error fetching history:', error);
        }
    }

    // Initial load
    fetchHistory();
</script>
{% endblock %}
